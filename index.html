<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#050508">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff0055;
            --secondary: #00ffcc;
            --bg-dark: #050508;
            --panel-bg: rgba(15, 15, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
            --card-bg: rgba(255, 255, 255, 0.03);
            --text-main: #f5f5fa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }

        body {
            font-family: 'Poppins', 'Hind Siliguri', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 0% 0%, rgba(255, 0, 85, 0.08) 0%, transparent 35%),
                              radial-gradient(circle at 100% 100%, rgba(0, 255, 204, 0.06) 0%, transparent 40%);
        }

        /* 🔒 SECURE LOCK SCREEN */
        #auth-lock-screen {
            position: fixed; inset: 0; background: #050508;
            z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .lock-box {
            background: rgba(20, 20, 30, 0.8); border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 380px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); backdrop-filter: blur(20px);
        }
        .lock-icon { font-size: 45px; color: var(--primary); margin-bottom: 15px; }
        .lock-box h3 { font-size: 20px; margin-bottom: 8px; font-weight: 700; }
        .lock-box p { font-size: 13px; color: #888; margin-bottom: 20px; }
        .pass-input {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.5); color: #fff; font-size: 16px; text-align: center;
            letter-spacing: 4px; outline: none; margin-bottom: 15px;
        }
        .pass-input:focus { border-color: var(--primary); }
        .submit-pass-btn {
            width: 100%; padding: 12px; border: none; border-radius: 10px;
            background: linear-gradient(90deg, var(--primary), #ff0077);
            color: #fff; font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .err-msg { color: #ff3333; font-size: 12px; margin-top: 10px; display: none; }

        /* Main App Elements */
        .top-nav { background: rgba(6, 6, 10, 0.95); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); z-index: 100; }
        .logo { font-size: 22px; font-weight: 900; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .main-app { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }
        .player-side { flex: 2.6; display: flex; flex-direction: column; gap: 12px; min-width: 0; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
        video { width: 100%; height: 100%; object-fit: contain; }
        .ott-controls-bar { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95)); padding: 25px 15px 12px 15px; display: flex; align-items: center; justify-content: space-between; z-index: 43; opacity: 0; transition: opacity 0.3s; }
        .video-container:hover .ott-controls-bar { opacity: 1; }
        .ott-ctrl-left, .ott-ctrl-right { display: flex; align-items: center; gap: 14px; }
        .ott-icon-btn { background: transparent; border: none; color: #fff; font-size: 16px; cursor: pointer; }
        .ott-select { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: #fff; border-radius: 6px; padding: 4px 8px; font-size: 11px; }
        .player-channel-loader { position: absolute; inset: 0; background: #050508; display: flex; align-items: center; justify-content: center; z-index: 50; opacity: 0; visibility: hidden; }
        .player-channel-loader.active { opacity: 1; visibility: visible; }
        .loader-ring { width: 40px; height: 40px; border: 4px solid transparent; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .ch-info { padding: 14px; background: var(--panel-bg); border-radius: 14px; border-left: 5px solid var(--primary); }
        .sidebar { flex: 1.4; background: var(--panel-bg); border-radius: 16px; display: flex; flex-direction: column; border: 1px solid var(--glass-border); min-width: 360px; }
        .sidebar-header { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
        .search-input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.4); color: #fff; font-size: 13px; outline: none; }
        .tabs { display: flex; gap: 6px; }
        .tab { padding: 6px 12px; background: rgba(255,255,255,0.03); border-radius: 20px; font-size: 11px; cursor: pointer; color: #bbb; }
        .tab.active { background: var(--primary); color: #fff; font-weight: 600; }
        .channel-list { flex: 1; overflow-y: auto; padding: 0 12px; }
        .channel-card { display: flex; align-items: center; padding: 10px; background: var(--card-bg); margin-bottom: 8px; border-radius: 10px; cursor: pointer; }
        .ch-card-logo { width: 35px; height: 35px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 14px; color: var(--primary); }
        .support-footer { padding: 10px; text-align: center; color: var(--secondary); font-size: 11px; border-top: 1px solid var(--glass-border); }
        .support-footer a { color: var(--secondary); text-decoration: none; font-weight: bold; }

        @media (max-width: 950px) {
            .main-app { flex-direction: column; overflow-y: auto; }
            .sidebar { height: 450px; min-width: 100%; }
        }
    </style>
</head>
<body>

<!-- 🔒 SECURE LIGHTWEIGHT LOCK SCREEN -->
<div id="auth-lock-screen">
    <div class="lock-box">
        <div class="lock-icon"><i class="fas fa-shield-alt"></i></div>
        <h3>Anik Boss Premium OTT</h3>
        <p>সিস্টেম আনলক করতে সিকিউরিটি পিন দিন</p>
        <input type="password" id="ott-pass-field" class="pass-input" placeholder="•••••" maxlength="10">
        <button class="submit-pass-btn" onclick="verifyOttAccess()">Unlock Securely</button>
        <div class="err-msg" id="lock-err-txt"><i class="fas fa-exclamation-circle"></i> এক্সেস ডিনাইড! পিন সঠিক নয়।</div>
    </div>
</div>

<nav class="top-nav">
    <div class="logo">ANIK BOSS OTT</div>
</nav>

<div class="main-app" id="app-wrapper">
    <div class="player-side">
        <div class="video-container" id="video-box">
            <video id="video" autoplay playsinline></video>
            <div class="player-channel-loader" id="player-loader"><div class="loader-ring"></div></div>

            <div class="ott-controls-bar">
                <div class="ott-ctrl-left">
                    <button class="ott-icon-btn" onclick="togglePlayPause()"><i class="fas fa-pause"></i></button>
                    <button class="ott-icon-btn" onclick="video.muted = !video.muted"><i class="fas fa-volume-high"></i></button>
                </div>
                <div class="ott-ctrl-right">
                    <select class="ott-select" id="quality-ctrl" onchange="changeHlsQuality(this.value)"><option value="-1">Auto Quality</option></select>
                    <button class="ott-icon-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>

        <div class="ch-info">
            <h2 id="cur-name">সিস্টেম লকড</h2>
            <div id="cur-cat" style="font-size: 12px; color: #888; margin-top: 4px;">পিন ভেরিফাই করুন...</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <input type="text" id="search" class="search-input" placeholder="চ্যানেল খুঁজুন...">
            <div class="tabs">
                <div class="tab active" data-scope="All">All Channels</div>
                <div class="tab" data-scope="Sports">🏆 Sports Channels</div>
            </div>
        </div>
        <div class="channel-list" id="list"></div>
        <div class="support-footer">
            Tech Support: <a href="https://wa.me/8801859334774" target="_blank">01859334774</a>
        </div>
    </div>
</div>

<script>
    // 🛡️ ANTI-INSPECT SYSTEM (PRO-BLOCK)
    document.addEventListener('contextmenu', e => e.preventDefault()); // Right Click Block
    document.onkeydown = function(e) {
        if (e.keyCode == 123) return false; // F12 Block
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
    };

    // 🔑 O1859 এর এনক্রিপ্টেড রূপ (কোডে সরাসরি পাসওয়ার্ড নেই)
    const secureToken = "MDE4NTk=";

    function verifyOttAccess() {
        const userInput = document.getElementById('ott-pass-field').value.trim();
        
        // ইউজার ইনপুটকে ব্রাউজারের নিজস্ব মেকানিজম দিয়ে এনকোড করা হচ্ছে
        const encodedInput = btoa(userInput); 
        const errTxt = document.getElementById('lock-err-txt');
        
        if (encodedInput === secureToken) {
            document.getElementById('auth-lock-screen').style.display = 'none';
            syncPlaylist(); // প্লেলিস্ট লোড হবে সফল হলে
        } else {
            errTxt.style.display = 'block';
            document.getElementById('ott-pass-field').value = '';
        }
    }

    document.getElementById('ott-pass-field').addEventListener('keyup', (e) => { if (e.key === 'Enter') verifyOttAccess(); });

    const m3uUrl = 'https://raw.githubusercontent.com/sydul104/main04/refs/heads/main/my';
    const video = document.getElementById('video');
    const listDiv = document.getElementById('list');
    const playerLoader = document.getElementById('player-loader');
    const qualityCtrl = document.getElementById('quality-ctrl');
    let allChannels = [];
    let hlsInstance = null;

    async function syncPlaylist() {
        try {
            const res = await fetch(m3uUrl);
            const text = await res.text();
            parseM3U(text);
        } catch (e) { document.getElementById('cur-name').textContent = "Server Offline."; }
    }

    function parseM3U(text) {
        const lines = text.split('\n');
        let cur = { name: "", group: "", logo: "" };
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith("#EXTINF:")) {
                const parts = line.split(",");
                cur.name = parts[parts.length - 1] || "Live Channel";
                const gMatch = line.match(/group-title="([^"]+)"/i);
                cur.group = gMatch ? gMatch[1] : "General";
                const lMatch = line.match(/tvg-logo="([^"]+)"/i);
                cur.logo = lMatch ? lMatch[1] : "";
            } else if (line.startsWith("http")) {
                allChannels.push({ id: btoa(line).substring(0,12), name: cur.name, url: line, cat: cur.group, logo: cur.logo });
                cur = { name: "", group: "", logo: "" };
            }
        }
        renderChannels("All");
        if (allChannels.length > 0) initiateStream(allChannels[0]);
    }

    function renderChannels(scope, filterText = "") {
        listDiv.innerHTML = '';
        let list = allChannels;
        if (scope === "Sports") list = allChannels.filter(c => c.cat.toLowerCase().includes('sport') || c.name.toLowerCase().includes('sport') || c.name.toLowerCase().includes('sony') || c.name.toLowerCase().includes('star'));
        if (filterText) list = list.filter(c => c.name.toLowerCase().includes(filterText));

        list.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            let logoHtml = ch.logo ? `<img src="${ch.logo}" style="width:100%;height:100%;object-fit:cover;" onerror="this.outerHTML='<i class=\\'fas fa-tv\\'></i>'">` : `<i class="fas fa-tv"></i>`;
            card.innerHTML = `<div class="ch-card-logo">${logoHtml}</div><div style="font-weight:600;font-size:13px;">${ch.name}</div>`;
            card.onclick = () => initiateStream(ch);
            listDiv.appendChild(card);
        });
    }

    function initiateStream(ch) {
        playerLoader.classList.add('active');
        document.getElementById('cur-name').textContent = ch.name;
        document.getElementById('cur-cat').textContent = `Category: ${ch.cat}`;
        if (hlsInstance) { hlsInstance.destroy(); }
        if (Hls.isSupported()) {
            hlsInstance = new Hls(); hlsInstance.loadSource(ch.url); hlsInstance.attachMedia(video);
            hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(()=>{}); populateQualityMenu(); });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) { video.src = ch.url; }
    }

    function populateQualityMenu() {
        if (!hlsInstance) return;
        qualityCtrl.innerHTML = '<option value="-1">Auto Quality</option>';
        hlsInstance.qualityLevels.forEach((level, idx) => {
            const opt = document.createElement('option'); opt.value = idx; opt.textContent = level.height + 'p'; qualityCtrl.appendChild(opt);
        });
    }

    function changeHlsQuality(idx) { if (hlsInstance) hlsInstance.currentLevel = parseInt(idx); }
    function togglePlayPause() { video.paused ? video.play() : video.pause(); }
    function toggleFullscreen() { document.fullscreenElement ? document.exitFullscreen() : document.getElementById('video-box').requestFullscreen(); }

    document.getElementById('search').addEventListener('input', (e) => renderChannels(document.querySelector('.tab.active').getAttribute('data-scope'), e.target.value.toLowerCase()));
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(p => p.classList.remove('active'));
            t.classList.add('active'); renderChannels(t.getAttribute('data-scope'));
        });
    });

    window.addEventListener('DOMContentLoaded', () => {
        video.addEventListener('waiting', () => playerLoader.classList.add('active'));
        video.addEventListener('playing', () => playerLoader.classList.remove('active'));
    });
</script>
</body>
</html>
