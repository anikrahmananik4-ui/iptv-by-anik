<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anik Boss IPTV | Real-time Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #ffd700;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.05);
            --neon: 0 0 20px rgba(255, 0, 0, 0.6);
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Full Screen Loader */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pulse { animation: pulse 1.5s infinite; font-size: 35px; font-weight: bold; color: var(--primary); letter-spacing: 5px; }
        @keyframes pulse { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        /* Modern Top Nav */
        .top-nav {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            padding: 10px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { font-size: 22px; font-weight: 800; background: linear-gradient(to right, #f00, #ff0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Dashboard Stats */
        .dashboard-stats { display: flex; align-items: center; gap: 15px; font-size: 13px; }
        .stat-item { background: var(--glass); padding: 5px 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 8px; }
        .stat-item i { color: var(--secondary); }

        .marquee-container { background: #111; color: var(--secondary); padding: 5px 0; font-size: 13px; border-bottom: 1px solid #222; }

        /* Main App Layout */
        .main-app { display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 15px; }

        /* Left: Player Section */
        .player-side { flex: 2.8; display: flex; flex-direction: column; }
        .video-wrapper {
            width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.1);
        }
        video { width: 100%; height: 100%; }

        .ch-info {
            margin-top: 15px; padding: 15px; background: var(--glass);
            border-radius: 12px; border-left: 5px solid var(--primary); backdrop-filter: blur(10px);
        }

        /* Right: Sidebar */
        .sidebar {
            flex: 1.2; background: var(--glass); border-radius: 15px;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px); min-width: 320px;
        }
        .sidebar-header { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .search-input {
            width: 100%; padding: 10px 15px; border-radius: 10px;
            border: none; background: rgba(0,0,0,0.4); color: #fff; box-sizing: border-box;
        }
        
        .tabs { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .tab { padding: 6px 15px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 12px; cursor: pointer; white-space: nowrap; border: 1px solid transparent; }
        .tab.active { background: var(--primary); box-shadow: var(--neon); }

        .channel-list { flex: 1; overflow-y: auto; padding: 10px; }
        .channel-item {
            display: flex; align-items: center; padding: 10px;
            background: rgba(255,255,255,0.03); margin-bottom: 8px;
            border-radius: 10px; cursor: pointer; transition: 0.2s; border: 1px solid transparent;
        }
        .channel-item:hover { background: rgba(255,255,255,0.08); transform: translateX(5px); }
        .channel-item.active { background: linear-gradient(90deg, rgba(255,0,0,0.2), transparent); border-left: 4px solid var(--primary); }
        
        .ch-icon { width: 32px; height: 32px; background: #222; border-radius: 6px; display: flex; align-items: center; justify-content: center; margin-right: 12px; color: var(--primary); font-weight: bold; }

        .support-footer { padding: 12px; text-align: center; background: rgba(0,255,0,0.05); color: #0f0; font-size: 13px; border-top: 1px solid rgba(255,255,255,0.05); border-radius: 0 0 15px 15px; }

        @media (max-width: 900px) { .main-app { flex-direction: column; overflow-y: auto; } .sidebar { height: 500px; } }
    </style>
</head>
<body>

<div id="loader">
    <div class="pulse">ANIK BOSS</div>
    <div style="color: #444; margin-top: 10px; font-size: 12px; letter-spacing: 2px;">SECURE IPTV DASHBOARD</div>
</div>

<nav class="top-nav">
    <div class="logo">ANIK BOSS IPTV</div>
    
    <div class="dashboard-stats">
        <div class="stat-item" title="আপনার অবস্থান অনুযায়ী আবহাওয়া">
            <i class="fas fa-location-arrow"></i>
            <span id="location-name">Detecting...</span>
            <i class="fas fa-temperature-high" style="margin-left:5px;"></i>
            <span id="temp">--°C</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-clock"></i>
            <span id="clock">00:00:00</span>
        </div>
        <div class="stat-item">
            <i class="fas fa-calendar-alt"></i>
            <span id="date">Date</span>
        </div>
    </div>
</nav>

<div class="marquee-container">
    <marquee>
        IPTV BY Anik Boss এ সকল বাংলাদেশী চ্যানেল ফ্রিতে দেখতে পারবেন। যোগাযোগ: 01859334774 (অনিক ভাই)
    </marquee>
</div>

<div class="main-app">
    <div class="player-side">
        <div class="video-wrapper">
            <video id="video" controls autoplay playsinline></video>
        </div>
        <div class="ch-info">
            <h2 id="cur-name" style="margin:0; font-size: 20px; color:var(--primary);">Loading Stream...</h2>
            <div id="cur-cat" style="color:var(--secondary); font-size: 13px; margin-top: 3px;">Category: Bangladeshi</div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <input type="text" id="search" class="search-input" placeholder="Search Channel..." onkeyup="applyFilter()">
            <div class="tabs" id="tabs-container">
                <div class="tab active" onclick="setCategory('All', this)">All</div>
                <div class="tab" onclick="setCategory('Bangladeshi', this)">Bangladeshi</div>
                <div class="tab" onclick="setCategory('News', this)">News</div>
                <div class="tab" onclick="setCategory('Sports', this)">Sports</div>
            </div>
        </div>
        <div class="channel-list" id="list"></div>
        <div class="support-footer">
            <i class="fab fa-whatsapp"></i> Contact: 01859334774
        </div>
    </div>
</div>

<script>
    const m3uUrl = 'https://raw.githubusercontent.com/sydul104/main04/refs/heads/main/my';
    const video = document.getElementById('video');
    const listDiv = document.getElementById('list');
    let allData = [];
    let currentCat = 'All';

    // --- 1. Real-time Clock & Date ---
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString();
        document.getElementById('date').innerText = now.toLocaleDateString('bn-BD', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    setInterval(updateClock, 1000);

    // --- 2. Live User Location & Weather ---
    function getLiveLocationWeather() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                
                try {
                    // Fetch Weather
                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const weatherData = await weatherRes.json();
                    document.getElementById('temp').innerText = `${Math.round(weatherData.current_weather.temperature)}°C`;
                    
                    // Fetch Location Name (Reverse Geocoding)
                    const locRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const locData = await locRes.json();
                    const city = locData.address.city || locData.address.town || locData.address.village || "Unknown";
                    document.getElementById('location-name').innerText = city;
                } catch (e) {
                    fallbackWeather();
                }
            }, () => { fallbackWeather(); });
        } else { fallbackWeather(); }
    }

    function fallbackWeather() {
        document.getElementById('location-name').innerText = "Dhaka";
        document.getElementById('temp').innerText = "24°C";
    }
    getLiveLocationWeather();

    // --- 3. IPTV Core Logic ---
    window.onload = () => {
        setTimeout(() => document.getElementById('loader').style.display='none', 2000);
        fetchM3U();
    };

    async function fetchM3U() {
        try {
            const res = await fetch(m3uUrl);
            const text = await res.text();
            parse(text);
        } catch (e) { console.error("Load Failed"); }
    }

    function parse(data) {
        const lines = data.split('\n');
        let name = "";
        lines.forEach(line => {
            if (line.includes("#EXTINF:")) {
                name = line.split(",")[1] || "Unknown";
            } else if (line.startsWith("http")) {
                let cat = "Others";
                const n = name.toLowerCase();
                if(n.includes("bd") || n.includes("bangla") || n.includes("somoy") || n.includes("btv")) cat = "Bangladeshi";
                else if(n.includes("news")) cat = "News";
                else if(n.includes("sport")) cat = "Sports";
                allData.push({ name: name.trim(), url: line.trim(), cat });
            }
        });
        render(allData);
        if(allData.length > 0) play(allData[0].url, allData[0].name, allData[0].cat);
    }

    function render(list) {
        listDiv.innerHTML = '';
        list.forEach((ch, i) => {
            const item = document.createElement('div');
            item.className = 'channel-item';
            item.innerHTML = `<div class="ch-icon">${i+1}</div><div><div style="font-weight:600; font-size:13px;">${ch.name}</div><div style="font-size:10px; color:#666;">${ch.cat}</div></div>`;
            item.onclick = () => play(ch.url, ch.name, ch.cat, item);
            listDiv.appendChild(item);
        });
    }

    function play(url, name, cat, el) {
        document.getElementById('cur-name').innerText = name;
        document.getElementById('cur-cat').innerText = "Category: " + cat;
        document.querySelectorAll('.channel-item').forEach(i => i.classList.remove('active'));
        if(el) el.classList.add('active');

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
        } else { video.src = url; video.play(); }
    }

    function setCategory(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        applyFilter();
    }

    function applyFilter() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = allData.filter(ch => (currentCat === 'All' || ch.cat === currentCat) && ch.name.toLowerCase().includes(q));
        render(filtered);
    }
</script>

</body>
  </html>
